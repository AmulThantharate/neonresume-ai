apiVersion: apps/v1
kind: Deployment
metadata:
  name: neon-ats
  labels:
    app: neon-ats
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neon-ats
  template:
    metadata:
      labels:
        app: neon-ats
    spec:
      containers:
        - name: neon-ats
          image: neon-ats:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: neon-ats
spec:
  selector:
    app: neon-ats
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
